---
routes:
  - plugins:
      opentelemetry:
        enabled: true
      http-logger:
        enabled: true
        uri: http://loki:3100/loki/api/v1/push
        method: POST
        content_type: application/json
        log_format:
          service: "apisix"
          route: "$uri"
          method: "$request_method"
          status: "$status"
          response_time: "$request_time"
          upstream_addr: "$upstream_addr"
          trace_id: "$http_x_request_id"
    uri: /agent/*
    upstream:
      nodes:
        host.docker.internal:8000: 1
  - plugins:
      opentelemetry:
        enabled: true
      http-logger:
        enabled: true
        uri: http://loki:3100/loki/api/v1/push
        method: POST
        content_type: application/json
        log_format:
          service: "apisix"
          route: "$uri"
          method: "$request_method"
          status: "$status"
          response_time: "$request_time"
          upstream_addr: "$upstream_addr"
    uri: /api/go/*
    upstream:
      nodes:
        host.docker.internal:8081: 1
  - plugins:
      opentelemetry:
        enabled: true
      http-logger:
        enabled: true
        uri: http://loki:3100/loki/api/v1/push
        method: POST
        content_type: application/json
        log_format:
          service: "apisix"
          route: "$uri"
          method: "$request_method"
          status: "$status"
          response_time: "$request_time"
          upstream_addr: "$upstream_addr"
    uri: /api/java/*
    upstream:
      nodes:
        host.docker.internal:8082: 1
stream_plugins:
  - ip-restriction
  - limit-conn
  - mqtt-proxy
  - syslog
deployment:
  etcd:
    watch_timeout: 50
    startup_retry: 2
    prefix: /apisix
    host:
      - "http://etcd:2379"
    timeout: 30
    tls:
      verify: false
  role: traditional
  role_traditional:
    config_provider: etcd
  admin:
    admin_listen:
      port: 9180
      ip: 0.0.0.0
    enable_admin_ui: true
    admin_key_required: true
    admin_api_version: v3
    allow_admin:
      - "0.0.0.0/0" # 修改为允许所有 IP（开发环境）
      # 生产环境建议指定具体 IP 段，如：
      # - "172.20.0.0/16"  # Docker 网段
      # - "192.168.1.0/24"  # 内网网段
    admin_key:
      - name: admin
        role: admin
        key: zROmjQmfUScormfShcCxRsbwApcdSDqC
    enable_admin_cors: true
  config_provider: etcd
plugin_attr:
  opentelemetry:
    sampler: always_on
    trace_id_source: x-request-id
    set_ngx_var: false
    resource:
      service.name: APISIX
    trace_id_format: w3c
    collector:
      request_timeout: 3
      address: jaeger:4317
      request_headers:
        Authorization: token
    batch_span_processor:
      inactive_timeout: 1
      max_export_batch_size: 16
      drop_on_queue_full: false
      max_queue_size: 1024
      batch_timeout: 2
  inspect:
    delay: 3
    hooks_file: /usr/local/apisix/plugin_inspect_hooks.lua
  zipkin:
    set_ngx_var: false
  log-rotate:
    interval: 3600
    max_kept: 168
    enable_compression: false
    timeout: 10000
    max_size: -1
  server-info:
    report_ttl: 60
  skywalking:
    service_instance_name: APISIX Instance Name
    service_name: APISIX
    endpoint_addr: http://127.0.0.1:12800
    report_interval: 3
  dubbo-proxy:
    upstream_multiplex_count: 32
  proxy-mirror:
    timeout:
      send: 60s
      read: 60s
      connect: 60s
  prometheus:
    export_uri: /apisix/prometheus/metrics
    export_addr:
      port: 9091
      ip: 0.0.0.0
    metric_prefix: apisix_
    enable_export_server: true
etcd:
  watch_timeout: 50
  startup_retry: 2
  prefix: /apisix
  host:
    - "http://etcd:2379"
  timeout: 30
  tls:
    verify: false
plugins:
  - opentelemetry
  - cors
  - limit-req
  - http-logger
  - file-logger
  - kafka-logger
apisix:
  router:
    ssl: radixtree_sni
    http: radixtree_host_uri
  enable_resolv_search_opt: true
  resolver_timeout: 5
  enable_http2: true
  normalize_uri_like_servlet: false
  data_encryption:
    keyring:
      - qeddd145sfvddff3
      - edd1c9f0985e76a2
    enable_encrypt_fields: true
  ssl:
    listen:
      - enable_http3: false
        port: 9443
    ssl_trusted_certificate: /etc/ssl/certs/ca-certificates.crt
    ssl_session_tickets: false
    enable: true
    ssl_protocols: TLSv1.2 TLSv1.3
    ssl_ciphers: ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
  show_upstream_status_in_response_header: false
  enable_server_tokens: true
  disable_sync_configuration_during_start: false
  node_listen:
    - 9080
  enable_dev_mode: false
  enable_reuseport: true
  enable_ipv6: true
  extra_lua_path: ""
  extra_lua_cpath: ""
  events:
    module: lua-resty-events
  proxy_cache:
    zones:
      - cache_levels: "1:2"
        name: disk_cache_one
        memory_size: 50m
        disk_size: 1G
        disk_path: /tmp/disk_cache_one
      - memory_size: 50m
        name: memory_cache
    cache_ttl: 10s
  enable_control: true
  enable_admin: true
  proxy_mode: http
  delete_uri_tail_slash: false
graphql:
  max_size: 1048576
nginx_config:
  max_pending_timers: 16384
  max_running_timers: 4096
  meta:
    lua_shared_dict:
      prometheus-metrics: 15m
      status-report: 1m
      standalone-config: 10m
  event:
    worker_connections: 10620
  http:
    keepalive_timeout: 60s
    client_header_timeout: 60s
    client_body_timeout: 60s
    client_max_body_size: 0
    send_timeout: 10s
    underscores_in_headers: "on"
    real_ip_header: X-Real-IP
    real_ip_recursive: "off"
    real_ip_from:
      - 127.0.0.1
      - "unix:"
    access_log: logs/access.log
    proxy_ssl_server_name: true
    access_log_format:
      $remote_addr - $remote_user [$time_local] $http_host "$request"
      $status $body_bytes_sent $request_time "$http_referer" "$http_user_agent" $upstream_addr
      $upstream_status $upstream_response_time "$upstream_scheme://$upstream_host$upstream_uri"
    charset: utf-8
    access_log_format_escape: default
    variables_hash_max_size: 2048
    upstream:
      keepalive_timeout: 60s
      keepalive_requests: 1000
      keepalive: 320
    lua_shared_dict:
      plugin-ai-rate-limiting: 10m
      prometheus-metrics: 10m
      plugin-limit-conn-redis-cluster-slot-lock: 1m
      tracing_buffer: 10m
      etcd-cluster-health-check: 10m
      discovery: 1m
      internal-status: 10m
      upstream-healthcheck: 10m
      worker-events: 10m
      lrucache-lock: 10m
      balancer-ewma: 10m
      balancer-ewma-locks: 10m
      balancer-ewma-last-touched-at: 10m
      plugin-limit-count: 10m
      plugin-limit-conn: 10m
      plugin-limit-count-redis-cluster-slot-lock: 1m
      plugin-limit-req-redis-cluster-slot-lock: 1m
      plugin-limit-req: 10m
      plugin-api-breaker: 10m
      jwks: 1m
      introspection: 10m
      access-tokens: 1m
      ext-plugin: 1m
      tars: 1m
      cas-auth: 10m
      ocsp-stapling: 10m
      mcp-session: 10m
      plugin-ai-rate-limiting-reset-header: 10m
    access_log_buffer: 16384
    enable_access_log: true
  stream_configuration_snippet: ""
  http_end_configuration_snippet: ""
  error_log: logs/error.log
  error_log_level: warn
  main_configuration_snippet: ""
  http_configuration_snippet: ""
  stream:
    enable_access_log: false
    access_log: logs/access_stream.log
    lua_shared_dict:
      etcd-cluster-health-check-stream: 10m
      lrucache-lock-stream: 10m
      plugin-limit-conn-stream: 10m
      worker-events-stream: 10m
      tars-stream: 1m
      upstream-healthcheck-stream: 10m
    access_log_format:
      $remote_addr [$time_local] $protocol $status $bytes_sent $bytes_received
      $session_time
    access_log_format_escape: default
  http_server_location_configuration_snippet: ""
  http_admin_configuration_snippet: ""
  worker_processes: auto
  enable_cpu_affinity: false
  worker_rlimit_nofile: 20480
  worker_shutdown_timeout: 240s
  http_server_configuration_snippet: ""
...
