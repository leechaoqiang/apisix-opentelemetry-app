apiVersion: 1

providers:
  - name: 'APISIX Dashboards'
    orgId: 1
    folder: 'APISIX'
    folderUid: 'apisix'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/apisix

  - name: 'Application Dashboards'
    orgId: 1
    folder: 'Applications'
    folderUid: 'applications'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards/applications